<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Gestão de Clientes</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #000000;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: #FFFFFF;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            overflow: hidden;
            padding: 20px;
        }

        /* Header com cores preto e azul */
        header {
            background: linear-gradient(135deg, #000000 0%, #0056b3 100%);
            color: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 i {
            color: #ff6b00;
            margin-right: 10px;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .btn-logout {
            background: #ff6b00;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-logout:hover {
            background: #ff8c2e;
            transform: translateY(-2px);
        }

        /* Cards de estatísticas */
        .stats-panel {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: linear-gradient(135deg, #0056b3 0%, #000000 100%);
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            transition: transform 0.3s;
            border-bottom: 4px solid #ff6b00;
        }

        .stat-card:hover {
            transform: translateY(-5px);
        }

        .stat-card i {
            font-size: 2em;
            margin-bottom: 10px;
            color: #ff6b00;
        }

        .stat-card h3 {
            font-size: 2em;
            margin: 10px 0;
        }

        /* Formulário */
        .form-container {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 30px;
            border-left: 4px solid #ff6b00;
        }

        .form-container h2 {
            color: #0056b3;
            margin-bottom: 20px;
        }

        .form-container h2 i {
            color: #ff6b00;
            margin-right: 10px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 15px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #000000;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 5px;
            font-size: 14px;
            transition: all 0.3s;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            border-color: #ff6b00;
            outline: none;
            box-shadow: 0 0 5px rgba(255, 107, 0, 0.3);
        }

        .btn-submit {
            background: linear-gradient(135deg, #0056b3 0%, #000000 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            width: 100%;
            transition: all 0.3s;
            font-weight: bold;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 86, 179, 0.3);
        }

        /* Botões de ação */
        .btn-export, .btn-import {
            background: #ff6b00;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
        }

        .btn-export:hover, .btn-import:hover {
            background: #ff8c2e;
            transform: translateY(-2px);
        }

        /* Lista de clientes */
        .clients-container {
            margin-top: 20px;
        }

        .clients-container h2 {
            color: #0056b3;
            margin-bottom: 20px;
        }

        .clients-container h2 i {
            color: #ff6b00;
            margin-right: 10px;
        }

        .search-bar {
            display: flex;
            gap: 10px;
            margin: 20px 0;
        }

        .search-bar input,
        .search-bar select {
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 5px;
            font-size: 14px;
            transition: all 0.3s;
        }

        .search-bar input:focus,
        .search-bar select:focus {
            border-color: #ff6b00;
            outline: none;
        }

        .search-bar input {
            flex: 1;
        }

        .clients-list {
            display: grid;
            gap: 15px;
        }

        .client-card {
            background: white;
            border: 1px solid #e0e0e0;
            border-radius: 10px;
            padding: 15px;
            transition: all 0.3s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            border-left: 4px solid #ff6b00;
        }

        .client-card:hover {
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            transform: translateY(-2px);
        }

        .client-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            padding-bottom: 10px;
            border-bottom: 2px solid #f0f0f0;
        }

        .client-name {
            font-size: 1.2em;
            font-weight: bold;
            color: #0056b3;
        }

        .client-status {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: bold;
        }

        .status-ativo {
            background: #0056b3;
            color: white;
        }

        .status-inativo {
            background: #000000;
            color: white;
        }

        .status-pendente {
            background: #ff6b00;
            color: white;
        }

        .client-details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 10px;
            margin: 10px 0;
        }

        .detail-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9em;
            color: #333;
        }

        .detail-item i {
            color: #ff6b00;
            width: 20px;
        }

        .client-actions {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .btn-edit, .btn-delete, .btn-history {
            padding: 5px 12px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.85em;
            transition: all 0.3s;
            font-weight: bold;
        }

        .btn-edit {
            background: #0056b3;
            color: white;
        }

        .btn-edit:hover {
            background: #003d82;
            transform: scale(1.05);
        }

        .btn-delete {
            background: #000000;
            color: white;
        }

        .btn-delete:hover {
            background: #333333;
            transform: scale(1.05);
        }

        .btn-history {
            background: #ff6b00;
            color: white;
        }

        .btn-history:hover {
            background: #ff8c2e;
            transform: scale(1.05);
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            animation: fadeIn 0.3s;
        }

        .modal-content {
            background: white;
            margin: 5% auto;
            padding: 20px;
            border-radius: 10px;
            width: 90%;
            max-width: 500px;
            animation: slideDown 0.3s;
            border-top: 4px solid #ff6b00;
        }

        .modal-content h2 {
            color: #0056b3;
            margin-bottom: 20px;
        }

        .close {
            float: right;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            color: #ff6b00;
            transition: all 0.3s;
        }

        .close:hover {
            color: #000000;
            transform: scale(1.1);
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideDown {
            from {
                transform: translateY(-50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        /* Responsividade */
        @media (max-width: 768px) {
            .form-row {
                grid-template-columns: 1fr;
            }
            
            .stats-panel {
                grid-template-columns: 1fr;
            }
        }

        /* Scrollbar personalizada */
        ::-webkit-scrollbar {
            width: 10px;
        }

        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }

        ::-webkit-scrollbar-thumb {
            background: #ff6b00;
            border-radius: 5px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #0056b3;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1><i class="fas fa-chart-line"></i> Sistema de Gestão de Clientes</h1>
            <div class="user-info">
                <span id="userName"><i class="fas fa-user"></i> Carregando...</span>
                <button id="logoutBtn" class="btn-logout"><i class="fas fa-sign-out-alt"></i> Sair</button>
            </div>
        </header>

        <!-- Painel de Estatísticas -->
        <div class="stats-panel">
            <div class="stat-card">
                <i class="fas fa-users"></i>
                <h3 id="totalClients">0</h3>
                <p>Total de Clientes</p>
            </div>
            <div class="stat-card">
                <i class="fas fa-check-circle"></i>
                <h3 id="paidClients">0</h3>
                <p>Pagamentos Realizados</p>
            </div>
            <div class="stat-card">
                <i class="fas fa-clock"></i>
                <h3 id="pendingClients">0</h3>
                <p>Pendentes</p>
            </div>
            <div class="stat-card">
                <i class="fas fa-dollar-sign"></i>
                <h3 id="totalValue">R$ 0</h3>
                <p>Valor Total</p>
            </div>
        </div>

        <!-- Botões de Ação -->
        <div style="display: flex; gap: 10px; margin-bottom: 20px;">
            <button id="exportBtn" class="btn-export"><i class="fas fa-download"></i> Exportar Dados</button>
            <button id="importBtn" class="btn-import"><i class="fas fa-upload"></i> Importar Dados</button>
            <input type="file" id="importFile" accept=".json" style="display: none;">
        </div>

        <!-- Formulário de Cadastro -->
        <div class="form-container">
            <h2><i class="fas fa-user-plus"></i> Novo Cliente</h2>
            <form id="clientForm">
                <div class="form-row">
                    <div class="form-group">
                        <label><i class="fas fa-user"></i> Nome do Cliente:</label>
                        <input type="text" id="clientName" required placeholder="Digite o nome completo">
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-tag"></i> Status:</label>
                        <select id="clientStatus">
                            <option value="ativo">Ativo</option>
                            <option value="inativo">Inativo</option>
                            <option value="pendente">Pendente</option>
                        </select>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label><i class="fas fa-dollar-sign"></i> Valor Total (R$):</label>
                        <input type="number" id="totalValue" step="0.01" required placeholder="0,00">
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-money-bill"></i> Valor Pago (R$):</label>
                        <input type="number" id="paidValue" step="0.01" value="0" placeholder="0,00">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label><i class="fas fa-folder"></i> Pasta Feita?</label>
                        <select id="hasFolder">
                            <option value="sim">Sim</option>
                            <option value="nao">Não</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-credit-card"></i> Pagamento:</label>
                        <select id="paymentStatus">
                            <option value="pendente">Pendente</option>
                            <option value="parcial">Parcial</option>
                            <option value="pago">Pago</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label><i class="fas fa-comment"></i> Observações:</label>
                    <textarea id="observations" rows="2" placeholder="Observações importantes sobre o cliente..."></textarea>
                </div>

                <button type="submit" class="btn-submit">
                    <i class="fas fa-save"></i> Salvar Cliente
                </button>
            </form>
        </div>

        <!-- Lista de Clientes -->
        <div class="clients-container">
            <h2><i class="fas fa-list"></i> Lista de Clientes</h2>
            <div class="search-bar">
                <input type="text" id="searchInput" placeholder="🔍 Buscar cliente por nome...">
                <select id="filterStatus">
                    <option value="todos">Todos os Status</option>
                    <option value="ativo">Ativo</option>
                    <option value="inativo">Inativo</option>
                    <option value="pendente">Pendente</option>
                </select>
            </div>
            <div id="clientsList" class="clients-list"></div>
        </div>
    </div>

    <!-- Modal de Edição -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2><i class="fas fa-edit"></i> Editar Cliente</h2>
            <form id="editForm">
                <input type="hidden" id="editClientId">
                <div class="form-group">
                    <label>Nome:</label>
                    <input type="text" id="editName" required>
                </div>
                <div class="form-group">
                    <label>Status:</label>
                    <select id="editStatus">
                        <option value="ativo">Ativo</option>
                        <option value="inativo">Inativo</option>
                        <option value="pendente">Pendente</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Valor Total (R$):</label>
                    <input type="number" id="editTotalValue" step="0.01" required>
                </div>
                <div class="form-group">
                    <label>Valor Pago (R$):</label>
                    <input type="number" id="editPaidValue" step="0.01" required>
                </div>
                <div class="form-group">
                    <label>Pasta Feita?</label>
                    <select id="editHasFolder">
                        <option value="sim">Sim</option>
                        <option value="nao">Não</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Pagamento:</label>
                    <select id="editPaymentStatus">
                        <option value="pendente">Pendente</option>
                        <option value="parcial">Parcial</option>
                        <option value="pago">Pago</option>
                    </select>
                </div>
                <button type="submit" class="btn-submit">Atualizar Cliente</button>
            </form>
        </div>
    </div>

    <script>
        // Sistema de gerenciamento de clientes com localStorage
        let clients = [];
        let currentUser = null;

        // Carregar dados do localStorage
        function loadData() {
            const stored = localStorage.getItem('clients');
            if (stored) {
                clients = JSON.parse(stored);
            } else {
                // Dados de exemplo
                clients = [
                    {
                        id: '1',
                        name: 'João Silva',
                        status: 'ativo',
                        totalValue: 1500.00,
                        paidValue: 1500.00,
                        hasFolder: 'sim',
                        paymentStatus: 'pago',
                        observations: 'Cliente preferencial',
                        lastAccessed: new Date().toLocaleString(),
                        lastUser: 'admin@email.com',
                        createdAt: '2024-01-01'
                    },
                    {
                        id: '2',
                        name: 'Maria Santos',
                        status: 'pendente',
                        totalValue: 2500.00,
                        paidValue: 1000.00,
                        hasFolder: 'nao',
                        paymentStatus: 'parcial',
                        observations: 'Aguardando documentação',
                        lastAccessed: new Date().toLocaleString(),
                        lastUser: 'admin@email.com',
                        createdAt: '2024-01-10'
                    },
                    {
                        id: '3',
                        name: 'Carlos Oliveira',
                        status: 'inativo',
                        totalValue: 800.00,
                        paidValue: 0,
                        hasFolder: 'nao',
                        paymentStatus: 'pendente',
                        observations: 'Cliente com débito',
                        lastAccessed: new Date().toLocaleString(),
                        lastUser: 'admin@email.com',
                        createdAt: '2024-01-15'
                    }
                ];
                saveData();
            }
            
            const user = localStorage.getItem('currentUser');
            if (user) {
                currentUser = JSON.parse(user);
                document.getElementById('userName').innerHTML = `<i class="fas fa-user-circle"></i> ${currentUser.name || currentUser.username}`;
            }
            
            displayClients();
            updateStats();
        }

        // Salvar dados no localStorage
        function saveData() {
            localStorage.setItem('clients', JSON.stringify(clients));
        }

        // Exibir clientes
        function displayClients() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const filterStatus = document.getElementById('filterStatus').value;
            
            let filtered = clients;
            
            if (searchTerm) {
                filtered = filtered.filter(client => 
                    client.name.toLowerCase().includes(searchTerm)
                );
            }
            
            if (filterStatus !== 'todos') {
                filtered = filtered.filter(client => client.status === filterStatus);
            }
            
            const clientsList = document.getElementById('clientsList');
            
            if (filtered.length === 0) {
                clientsList.innerHTML = '<div style="text-align: center; padding: 40px; color: #999;"><i class="fas fa-search"></i> Nenhum cliente encontrado</div>';
                return;
            }
            
            clientsList.innerHTML = filtered.map(client => `
                <div class="client-card">
                    <div class="client-header">
                        <div class="client-name"><i class="fas fa-user"></i> ${escapeHtml(client.name)}</div>
                        <div class="client-status status-${client.status}">${client.status.toUpperCase()}</div>
                    </div>
                    <div class="client-details">
                        <div class="detail-item">
                            <i class="fas fa-dollar-sign"></i>
                            <span>Total: R$ ${client.totalValue.toFixed(2)}</span>
                        </div>
                        <div class="detail-item">
                            <i class="fas fa-money-bill"></i>
                            <span>Pago: R$ ${client.paidValue.toFixed(2)}</span>
                        </div>
                        <div class="detail-item">
                            <i class="fas fa-folder"></i>
                            <span>Pasta: ${client.hasFolder === 'sim' ? '✓ Feita' : '✗ Não feita'}</span>
                        </div>
                        <div class="detail-item">
                            <i class="fas fa-credit-card"></i>
                            <span>Pagamento: ${getPaymentStatusText(client.paymentStatus)}</span>
                        </div>
                        <div class="detail-item">
                            <i class="fas fa-clock"></i>
                            <span>Último acesso: ${client.lastAccessed || 'Nunca'}</span>
                        </div>
                        <div class="detail-item">
                            <i class="fas fa-user"></i>
                            <span>Último usuário: ${client.lastUser || 'Nenhum'}</span>
                        </div>
                    </div>
                    ${client.observations ? `
                        <div class="detail-item">
                            <i class="fas fa-comment"></i>
                            <span>Obs: ${escapeHtml(client.observations)}</span>
                        </div>
                    ` : ''}
                    <div class="client-actions">
                        <button class="btn-edit" onclick="editClient('${client.id}')">
                            <i class="fas fa-edit"></i> Editar
                        </button>
                        <button class="btn-delete" onclick="deleteClient('${client.id}')">
                            <i class="fas fa-trash"></i> Excluir
                        </button>
                        <button class="btn-history" onclick="updateLastAccess('${client.id}')">
                            <i class="fas fa-history"></i> Registrar Acesso
                        </button>
                    </div>
                </div>
            `).join('');
        }

        // Atualizar estatísticas
        function updateStats() {
            const total = clients.length;
            const paid = clients.filter(c => c.paymentStatus === 'pago').length;
            const pending = clients.filter(c => c.paymentStatus === 'pendente').length;
            const totalValue = clients.reduce((sum, c) => sum + c.totalValue, 0);
            
            document.getElementById('totalClients').textContent = total;
            document.getElementById('paidClients').textContent = paid;
            document.getElementById('pendingClients').textContent = pending;
            document.getElementById('totalValue').textContent = `R$ ${totalValue.toFixed(2)}`;
        }

        // Adicionar cliente
        document.getElementById('clientForm').addEventListener('submit', (e) => {
            e.preventDefault();
            
            const newClient = {
                id: Date.now().toString(),
                name: document.getElementById('clientName').value,
                status: document.getElementById('clientStatus').value,
                totalValue: parseFloat(document.getElementById('totalValue').value),
                paidValue: parseFloat(document.getElementById('paidValue').value),
                hasFolder: document.getElementById('hasFolder').value,
                paymentStatus: document.getElementById('paymentStatus').value,
                observations: document.getElementById('observations').value,
                lastAccessed: new Date().toLocaleString(),
                lastUser: currentUser ? currentUser.username : 'Sistema',
                createdAt: new Date().toISOString()
            };
            
            clients.unshift(newClient);
            saveData();
            
            document.getElementById('clientForm').reset();
            displayClients();
            updateStats();
            
            // Animação de sucesso
            alert('✅ Cliente adicionado com sucesso!');
        });

        // Editar cliente
        window.editClient = (id) => {
            const client = clients.find(c => c.id === id);
            if (client) {
                document.getElementById('editClientId').value = id;
                document.getElementById('editName').value = client.name;
                document.getElementById('editStatus').value = client.status;
                document.getElementById('editTotalValue').value = client.totalValue;
                document.getElementById('editPaidValue').value = client.paidValue;
                document.getElementById('editHasFolder').value = client.hasFolder;
                document.getElementById('editPaymentStatus').value = client.paymentStatus;
                
                document.getElementById('editModal').style.display = 'block';
            }
        };

        // Atualizar cliente
        document.getElementById('editForm').addEventListener('submit', (e) => {
            e.preventDefault();
            
            const id = document.getElementById('editClientId').value;
            const index = clients.findIndex(c => c.id === id);
            
            if (index !== -1) {
                clients[index] = {
                    ...clients[index],
                    name: document.getElementById('editName').value,
                    status: document.getElementById('editStatus').value,
                    totalValue: parseFloat(document.getElementById('editTotalValue').value),
                    paidValue: parseFloat(document.getElementById('editPaidValue').value),
                    hasFolder: document.getElementById('editHasFolder').value,
                    paymentStatus: document.getElementById('editPaymentStatus').value,
                    lastUser: currentUser ? currentUser.username : 'Sistema',
                    lastAccessed: new Date().toLocaleString()
                };
                
                saveData();
                document.getElementById('editModal').style.display = 'none';
                displayClients();
                updateStats();
                alert('✏️ Cliente atualizado com sucesso!');
            }
        });

        // Excluir cliente
        window.deleteClient = (id) => {
            if (confirm('⚠️ Tem certeza que deseja excluir este cliente? Esta ação não pode ser desfeita.')) {
                clients = clients.filter(c => c.id !== id);
                saveData();
                displayClients();
                updateStats();
                alert('🗑️ Cliente excluído com sucesso!');
            }
        };

        // Registrar último acesso
        window.updateLastAccess = (id) => {
            const index = clients.findIndex(c => c.id === id);
            if (index !== -1) {
                clients[index].lastAccessed = new Date().toLocaleString();
                clients[index].lastUser = currentUser ? currentUser.username : 'Sistema';
                saveData();
                displayClients();
                alert('📋 Acesso registrado com sucesso!');
            }
        };

        // Exportar dados
        document.getElementById('exportBtn').addEventListener('click', () => {
            const dataStr = JSON.stringify(clients, null, 2);
            const dataUri = 'data:application/json;charset=utf-8,'+ encodeURIComponent(dataStr);
            
            const exportFileDefaultName = `clientes_${new Date().toISOString().slice(0,19).replace(/:/g, '-')}.json`;
            
            const linkElement = document.createElement('a');
            linkElement.setAttribute('href', dataUri);
            linkElement.setAttribute('download', exportFileDefaultName);
            linkElement.click();
            
            alert('📥 Dados exportados com sucesso!');
        });

        // Importar dados
        document.getElementById('importBtn').addEventListener('click', () => {
            document.getElementById('importFile').click();
        });

        document.getElementById('importFile').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const importedData = JSON.parse(e.target.result);
                        if (Array.isArray(importedData)) {
                            clients = importedData;
                            saveData();
                            displayClients();
                            updateStats();
                            alert('📤 Dados importados com sucesso!');
                        } else {
                            alert('❌ Arquivo inválido');
                        }
                    } catch (error) {
                        alert('❌ Erro ao importar arquivo');
                    }
                };
                reader.readAsText(file);
            }
        });

        // Logout
        document.getElementById('logoutBtn').addEventListener('click', () => {
            localStorage.removeItem('currentUser');
            window.location.href = 'login.html';
        });

        // Funções utilitárias
        function getPaymentStatusText(status) {
            const statusMap = {
                'pago': '✅ Pago',
                'parcial': '🟡 Parcial',
                'pendente': '⏳ Pendente'
            };
            return statusMap[status] || status;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Event listeners
        document.getElementById('searchInput').addEventListener('input', () => displayClients());
        document.getElementById('filterStatus').addEventListener('change', () => displayClients());

        // Modal close
        document.querySelector('.close').onclick = () => {
            document.getElementById('editModal').style.display = 'none';
        };

        window.onclick = (event) => {
            if (event.target === document.getElementById('editModal')) {
                document.getElementById('editModal').style.display = 'none';
            }
        };

        // Inicializar
        loadData();
    </script>
</body>
</html>
